<title>Southwestern University Donor Brick Monument – Section 1</title>
<style>
:root {
  --brick-bg: #c8714a;
  --brick-border: #a0502e;
  --brick-mortar: #d4b896;
  --brick-text: #3a1a08;
  --brick-placeholder: #c9876a;
  --brick-placeholder-text: #b06540;
  --accent: #e8a050;
  --bg: #1e1208;
  --surface: #2e1c0e;
  --surface2: #3e2a18;
  --text: #f0e4d0;
  --muted: #9a7050;
  --highlight-bg: #fff176;
  --highlight-border: #f9a825;
  --active-bg: #ffeb3b;
  --active-border: #ff6f00;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Georgia, serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* ─── HEADER ─────────────────────── */
header {
  background: linear-gradient(135deg, #8b3a1e, #c8714a);
  padding: 14px 20px; display: flex; align-items: center; gap: 14px;
  box-shadow: 0 3px 10px rgba(0,0,0,.5); flex-shrink: 0;
}
.logo { font-size: 28px; }
.header-text h1 { font-size: 20px; font-weight: normal; }
.header-text p { font-size: 12px; color: rgba(255,255,255,.65); margin-top: 2px; }
.header-stats { margin-left: auto; text-align: right; font-size: 12px; color: rgba(255,255,255,.7); line-height: 1.6; }

/* ─── TOOLBAR ─────────────────────── */
.toolbar {
  background: var(--surface); border-bottom: 1px solid var(--surface2);
  padding: 10px 16px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; flex-shrink: 0;
}
.search-wrap { position: relative; flex: 1; min-width: 200px; }
.search-wrap input {
  width: 100%; padding: 8px 14px 8px 36px;
  background: var(--bg); border: 1px solid var(--surface2); border-radius: 20px;
  color: var(--text); font-size: 14px; outline: none; transition: border-color .2s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
#result-info { font-size: 13px; color: var(--accent); min-width: 120px; }
.ctrl-btn {
  background: var(--surface2); border: 1px solid #5a3a20; color: var(--text);
  padding: 7px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; font-family: inherit;
  transition: background .15s; white-space: nowrap;
}
.ctrl-btn:hover { background: #5a3a20; }
.tab-bar { display: flex; gap: 0; margin-left: 8px; }
.tab { padding: 7px 14px; cursor: pointer; font-size: 13px; color: var(--muted); border-bottom: 2px solid transparent; transition: all .2s; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ─── MAIN LAYOUT ─────────────────── */
.main { display: flex; flex: 1; overflow: hidden; }

/* ─── SIDEBAR ─────────────────────── */
.sidebar {
  width: 240px; min-width: 240px; background: var(--surface); border-right: 1px solid var(--surface2);
  display: none; flex-direction: column; overflow: hidden;
}
.sidebar h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); padding: 10px 14px 6px; }
#brick-list { flex: 1; overflow-y: auto; }
.list-item {
  padding: 8px 14px; cursor: pointer; border-bottom: 1px solid var(--surface2);
  font-size: 12px; line-height: 1.4; transition: background .15s;
}
.list-item:hover { background: var(--surface2); }
.list-item.highlighted { background: rgba(248,161,48,.15); }
.list-item .li-name { font-weight: bold; color: var(--text); }
.list-item .li-sub { color: var(--muted); margin-top: 2px; }
.list-item .li-pos { color: #6a4a28; font-size: 10px; margin-top: 1px; }

/* ─── VIEWPORT ─────────────────────── */
.viewport {
  flex: 1; overflow: hidden; position: relative; background: #0e0804; cursor: grab;
}
.viewport.dragging { cursor: grabbing; }
.canvas-wrap { position: absolute; transform-origin: 0 0; }

/* ─── BRICK GRID ─────────────────────── */
.brick-section-label {
  text-align: center; font-size: 11px; text-transform: uppercase; letter-spacing: 2px;
  color: var(--mortar); padding: 4px 0; font-family: sans-serif; color: #8a6040;
}
.brick-grid {
  display: grid;
  grid-template-columns: repeat(15, 96px);
  gap: 5px;
  padding: 12px;
  background: var(--brick-mortar);
  border: 6px solid var(--brick-mortar);
  border-radius: 4px;
  box-shadow: 0 4px 20px rgba(0,0,0,.6);
}

.brick {
  width: 96px; height: 60px;
  background: var(--brick-bg);
  border: 1.5px solid var(--brick-border);
  border-radius: 2px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 4px 5px; text-align: center;
  cursor: pointer; position: relative;
  transition: transform .15s, box-shadow .15s;
  user-select: none;
}
.brick:hover { transform: scale(1.04); box-shadow: 0 3px 12px rgba(0,0,0,.5); z-index: 10; }

.brick.size2 { grid-column: span 2; width: auto; }
.brick.size3 { grid-column: span 3; width: auto; }

.brick .bline {
  font-size: 7px; font-weight: bold; letter-spacing: 0.3px;
  color: var(--brick-text); line-height: 1.25; font-family: 'Times New Roman', serif;
  text-transform: uppercase; display: block;
}
.brick .bline:first-child { font-size: 8px; }

.brick.empty {
  background: var(--brick-placeholder); border-color: #b06040; cursor: default;
}
.brick.empty:hover { transform: none; box-shadow: none; }
.brick.empty::after {
  content: ''; display: block; width: 24px; height: 1px;
  background: var(--brick-placeholder-text); margin: 2px auto;
}

.brick.highlighted {
  background: var(--highlight-bg) !important;
  border-color: var(--highlight-border) !important;
  box-shadow: 0 0 0 3px var(--highlight-border), 0 0 16px rgba(249,168,37,.6) !important;
  z-index: 20;
}
.brick.highlighted .bline { color: #3a2000 !important; }

.brick.active-brick {
  background: var(--active-bg) !important;
  border-color: var(--active-border) !important;
  box-shadow: 0 0 0 3px var(--active-border), 0 0 24px rgba(255,111,0,.7) !important;
  z-index: 30;
  animation: bpulse 1.2s ease-in-out infinite;
}
@keyframes bpulse {
  0%,100% { box-shadow: 0 0 0 3px var(--active-border), 0 0 18px rgba(255,111,0,.6); }
  50% { box-shadow: 0 0 0 6px var(--active-border), 0 0 32px rgba(255,111,0,.9); }
}
.brick.active-brick .bline { color: #1a0800 !important; }

/* ─── ZOOM CONTROLS ─────────────────── */
.zoom-ctrl {
  position: absolute; bottom: 16px; right: 16px;
  display: flex; flex-direction: column; gap: 4px; z-index: 50;
}
.zb {
  width: 34px; height: 34px; background: var(--surface); border: 1px solid var(--surface2);
  color: var(--text); border-radius: 50%; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: background .15s;
}
.zb:hover { background: var(--surface2); }

/* ─── DETAIL PANEL ─────────────────── */
.detail-panel {
  position: absolute; bottom: 16px; left: 16px; z-index: 50;
  background: rgba(30,12,4,.92); border: 1px solid var(--surface2);
  border-radius: 10px; padding: 14px 18px; max-width: 280px;
  box-shadow: 0 4px 20px rgba(0,0,0,.7); display: none;
}
.detail-panel.open { display: block; }
.detail-panel h4 { font-size: 15px; color: var(--accent); margin-bottom: 6px; }
.detail-panel .detail-text { font-size: 13px; line-height: 1.6; color: var(--text); }
.detail-panel .detail-pos { font-size: 11px; color: var(--muted); margin-top: 6px; }
.detail-close { position: absolute; top: 8px; right: 10px; cursor: pointer; color: var(--muted); font-size: 16px; }

/* ─── LEGEND ─────────────────────── */
.legend {
  position: absolute; top: 10px; right: 10px; z-index: 50;
  background: rgba(30,12,4,.85); border: 1px solid var(--surface2);
  border-radius: 8px; padding: 10px 12px; font-size: 11px;
}
.legend-item { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.legend-swatch { width: 20px; height: 12px; border-radius: 2px; flex-shrink: 0; }

/* ─── TOAST ─────────────────────── */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--accent); color: var(--bg); padding: 9px 22px; border-radius: 20px;
  font-size: 13px; font-weight: bold; opacity: 0; pointer-events: none; z-index: 200;
  transition: opacity .25s;
}
#toast.show { opacity: 1; }

/* ─── SCROLLBAR ─────────────────────── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }
</style>
</head>

// ═══════════════════════════════════════════════════
// BUILD GRID
// ═══════════════════════════════════════════════════
const brickMap = {}; // "r,c" -> brick data

const bricks = RAW_BRICKS.map((b, i) => {
  const [row, col, l1, l2, l3, size] = b;
  const obj = {
    id: `b${i}`, row, col,
    lines: [l1, l2, l3].filter(Boolean),
    size: size || 1,
    name: l1
  };
  for (let dc = 0; dc < obj.size; dc++) {
    brickMap[`${row},${col+dc}`] = obj.id;
  }
  return obj;
});

const brickById = {};
bricks.forEach(b => brickById[b.id] = b);

// ═══════════════════════════════════════════════════
// RENDER GRID
// ═══════════════════════════════════════════════════
function renderGrid() {
  const grid = document.getElementById('brick-grid');
  grid.innerHTML = '';

  // Track which cells are occupied by wide bricks
  const occupied = new Set();
  bricks.forEach(b => {
    for (let dc = 1; dc < b.size; dc++) occupied.add(`${b.row},${b.col+dc}`);
  });

  for (let r = 0; r < GRID_ROWS; r++) {
    for (let c = 0; c < GRID_COLS; c++) {
      if (occupied.has(`${r},${c}`)) continue;

      const bid = brickMap[`${r},${c}`];
      if (bid) {
        const b = brickById[bid];
        const div = document.createElement('div');
        div.className = 'brick';
        if (b.size > 1) div.classList.add(`size${b.size}`);
        div.id = bid;
        div.dataset.row = r;
        div.dataset.col = c;
        b.lines.forEach(line => {
          const span = document.createElement('span');
          span.className = 'bline';
          span.textContent = line;
          div.appendChild(span);
        });
        div.addEventListener('click', () => selectBrick(bid));
        grid.appendChild(div);
      } else {
        const div = document.createElement('div');
        div.className = 'brick empty';
        div.dataset.row = r;
        div.dataset.col = c;
        grid.appendChild(div);
      }
    }
  }
}

// ═══════════════════════════════════════════════════
// SIDEBAR LIST
// ═══════════════════════════════════════════════════
function renderList(filtered) {
  const list = document.getElementById('brick-list');
  const items = (filtered || bricks).filter(b => b.lines.length > 0);
  items.sort((a, b) => a.lines[0].localeCompare(b.lines[0]));
  list.innerHTML = items.map(b => `
    <div class="list-item" data-id="${b.id}" onclick="selectBrick('${b.id}')">
      <div class="li-name">${b.lines[0]}</div>
      ${b.lines.slice(1).length ? `<div class="li-sub">${b.lines.slice(1).join(' · ')}</div>` : ''}
      <div class="li-pos">Row ${b.row+1}, Col ${b.col+1}</div>
    </div>
  `).join('');
  document.getElementById('recorded-count').textContent = bricks.length;
  document.getElementById('header-stats').innerHTML =
    `${bricks.length} bricks recorded<br>${GRID_ROWS*GRID_COLS - bricks.length} unrecorded`;
}

// ═══════════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════════
let searchMatches = [];
document.getElementById('search').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  document.querySelectorAll('.brick.highlighted, .brick.active-brick').forEach(el => {
    el.classList.remove('highlighted', 'active-brick');
  });
  document.querySelectorAll('.list-item.highlighted').forEach(el => el.classList.remove('highlighted'));
  closeDetail();

  if (!q) {
    document.getElementById('result-info').textContent = '';
    renderList();
    return;
  }

  searchMatches = bricks.filter(b => b.lines.some(l => l.toLowerCase().includes(q)));
  document.getElementById('result-info').textContent =
    searchMatches.length ? `${searchMatches.length} match${searchMatches.length > 1 ? 'es' : ''}` : 'No matches';

  renderList(searchMatches);
  searchMatches.forEach(b => {
    const el = document.getElementById(b.id);
    if (el) el.classList.add('highlighted');
    const li = document.querySelector(`.list-item[data-id="${b.id}"]`);
    if (li) li.classList.add('highlighted');
  });

  if (searchMatches.length === 1) {
    selectBrick(searchMatches[0].id);
  } else if (searchMatches.length > 1) {
    flyToBrich(searchMatches[0]);
  }
});

// ═══════════════════════════════════════════════════
// SELECT / FLY
// ═══════════════════════════════════════════════════
let selectedId = null;
function selectBrick(id) {
  if (selectedId) {
    const prev = document.getElementById(selectedId);
    if (prev) { prev.classList.remove('active-brick', 'highlighted'); prev.classList.add('highlighted'); }
  }
  selectedId = id;
  const b = brickById[id];
  const el = document.getElementById(id);
  if (el) { el.classList.remove('highlighted'); el.classList.add('active-brick'); }
  showDetail(b);
  flyToBrich(b);
  // Highlight in list
  document.querySelectorAll('.list-item').forEach(li => li.classList.remove('highlighted'));
  const li = document.querySelector(`.list-item[data-id="${id}"]`);
  if (li) { li.classList.add('highlighted'); li.scrollIntoView({ block: 'nearest' }); }
}

function showDetail(b) {
  const panel = document.getElementById('detail');
  document.getElementById('detail-name').textContent = b.lines[0];
  document.getElementById('detail-text').innerHTML = b.lines.slice(1).map(l => `<div>${l}</div>`).join('');
  document.getElementById('detail-pos').textContent = `Row ${b.row+1} of ${GRID_ROWS} · Col ${b.col+1} of ${GRID_COLS}`;
  panel.classList.add('open');
}

function closeDetail() {
  document.getElementById('detail').classList.remove('open');
  if (selectedId) {
    const el = document.getElementById(selectedId);
    if (el) { el.classList.remove('active-brick'); }
    selectedId = null;
  }
}

function flyToBrich(b) {
  const BRICK_W = 96 + 5, BRICK_H = 60 + 5;
  const PAD = 12;
  const bx = PAD + b.col * BRICK_W + BRICK_W/2;
  const by = PAD + 24 + b.row * BRICK_H + BRICK_H/2; // 24 for section label
  const vp = document.getElementById('viewport');
  const vw = vp.clientWidth, vh = vp.clientHeight;
  scale = Math.min(3.5, Math.max(scale, 1.8));
  panX = vw/2 - bx * scale;
  panY = vh/2 - by * scale;
  applyTransform();
}

// ═══════════════════════════════════════════════════
// PAN / ZOOM
// ═══════════════════════════════════════════════════
let scale = 1, panX = 0, panY = 0;
let dragging = false, dsx, dsy, dpx, dpy;

const viewport = document.getElementById('viewport');
const canvas = document.getElementById('canvas');

function applyTransform() {
  canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
  canvas.style.transformOrigin = '0 0';
}

function zoom(factor, cx, cy) {
  const vp = viewport.getBoundingClientRect();
  cx = cx ?? vp.width/2; cy = cy ?? vp.height/2;
  const ix = (cx - panX)/scale, iy = (cy - panY)/scale;
  scale = Math.max(0.15, Math.min(8, scale * factor));
  panX = cx - ix*scale; panY = cy - iy*scale;
  applyTransform();
}

function resetView() {
  const BRICK_W = 96 + 5, BRICK_H = 60 + 5;
  const totalW = GRID_COLS * BRICK_W + 30;
  const totalH = GRID_ROWS * BRICK_H + 60;
  const vp = viewport.getBoundingClientRect();
  scale = Math.min(vp.width / totalW, vp.height / totalH) * 0.92;
  panX = (vp.width - totalW * scale) / 2;
  panY = (vp.height - totalH * scale) / 2;
  applyTransform();
}

viewport.addEventListener('wheel', e => {
  e.preventDefault();
  const r = viewport.getBoundingClientRect();
  zoom(e.deltaY < 0 ? 1.12 : 1/1.12, e.clientX - r.left, e.clientY - r.top);
}, { passive: false });

viewport.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  dragging = true; viewport.classList.add('dragging');
  dsx = e.clientX; dsy = e.clientY; dpx = panX; dpy = panY;
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  panX = dpx + (e.clientX - dsx); panY = dpy + (e.clientY - dsy); applyTransform();
});
window.addEventListener('mouseup', () => { dragging = false; viewport.classList.remove('dragging'); });

// Touch
viewport.addEventListener('touchstart', e => {
  if (e.touches.length !== 1) return;
  dragging = true;
  dsx = e.touches[0].clientX; dsy = e.touches[0].clientY; dpx = panX; dpy = panY;
}, { passive: true });
viewport.addEventListener('touchmove', e => {
  if (!dragging || e.touches.length !== 1) return;
  panX = dpx + (e.touches[0].clientX - dsx); panY = dpy + (e.touches[0].clientY - dsy); applyTransform();
}, { passive: true });
viewport.addEventListener('touchend', () => { dragging = false; });

// ═══════════════════════════════════════════════════
// EXPORT
// ══════════════════════════════════════════════════
function exportCSV() {
  const header = 'name,line2,line3,row,col\n';
  const rows = bricks.map(b =>
    [`"${b.lines[0]}"`, `"${b.lines[1]||''}"`, `"${b.lines[2]||''}"`, b.row+1, b.col+1].join(',')
  ).join('\n');
  const blob = new Blob([header+rows], { type: 'text/csv' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'donor_bricks_section1.csv'; a.click();
  toast('CSV downloaded');
}

// ═══════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════
let toastT;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(() => t.classList.remove('show'), 2200);
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
renderGrid();
renderList();
setTimeout(resetView, 50);
</script>
