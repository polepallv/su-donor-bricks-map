<title>Donor Brick Monument – Inscriptions List</title>
<style>
:root {
  --accent: #e8a050;
  --bg: #1e1208;
  --surface: #2e1c0e;
  --surface2: #3e2a18;
  --text: #f0e4d0;
  --muted: #9a7050;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Georgia, serif; background: var(--bg); color: var(--text);
  height: 100vh; display: flex; flex-direction: column; overflow: hidden;
}

/* ─── HEADER ─────────────────────── */
header {
  background: linear-gradient(135deg, #8b3a1e, #c8714a);
  padding: 12px 20px; display: flex; align-items: center; gap: 14px;
  box-shadow: 0 3px 10px rgba(0,0,0,.5); flex-shrink: 0;
}
.logo { font-size: 26px; margin-right: 16px; flex-shrink: 0; }
.logo img { height: 36px; width: auto; display: block; }
.htext h1 { font-size: 19px; font-weight: normal; }
.hstats { margin-left: auto; text-align: right; font-size: 11px; color: rgba(255,255,255,.7); line-height: 1.6; }

/* ─── TOOLBAR ─────────────────────── */
.toolbar {
  background: var(--surface); border-bottom: 1px solid var(--surface2);
  padding: 8px 14px; display: flex; gap: 8px; align-items: center; flex-wrap: nowrap; flex-shrink: 0;
  overflow-x: auto;
}
.master-tab { padding: 7px 14px; cursor: pointer; font-size: 13px; color: var(--accent); border-bottom: 2px solid var(--accent); white-space: nowrap; }
.sw { position: relative; flex: 1; min-width: 230px; }
.sw input {
  width: 100%; padding: 7px 12px 7px 34px;
  background: var(--bg); border: 1px solid var(--surface2); border-radius: 18px;
  color: var(--text); font-size: 13px; outline: none; transition: border-color .2s;
}
.sw input:focus { border-color: var(--accent); }
.si { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; font-size: 13px; }
.sw-collapsed-label { display: none; }
#rinfo { font-size: 12px; color: var(--accent); min-width: 90px; }
.tabs { display: flex; margin-left: 6px; flex-shrink: 0; }
.tab { padding: 7px 13px; cursor: pointer; font-size: 12px; color: var(--muted);
       border-bottom: 2px solid transparent; transition: all .2s; white-space: nowrap; flex-shrink: 0; }
.tab:hover { color: var(--text); }

/* ─── LIST ─────────────────────── */
.main { flex: 1; overflow-y: auto; }
.status { padding: 14px 20px; font-size: 12px; color: var(--muted); }
.list-wrap { max-width: 980px; margin: 0 auto; padding: 6px 20px 60px; }
.list-header {
  display: flex; align-items: center; gap: 16px;
  padding: 8px 14px; border-bottom: 1px solid var(--surface2);
  font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted);
}
.list-header .lh-lines { flex: 1; min-width: 0; }
.list-header .lh-section { flex-shrink: 0; width: 210px; text-align: right; }
.list-header .lh-pos { flex-shrink: 0; width: 130px; text-align: right; }
.row {
  display: flex; align-items: center; gap: 16px;
  padding: 12px 14px; border-bottom: 1px solid var(--surface2);
}
.row-lines { flex: 1; min-width: 0; }
.row-lines div { font-size: 14px; line-height: 1.5; color: var(--text); }
.row-lines div:first-child { font-weight: bold; }
.row-section {
  flex-shrink: 0; width: 210px; text-align: right;
}
.row-section a {
  color: var(--accent); text-decoration: none; font-size: 12px;
  border: 1px solid var(--surface2); border-radius: 12px; padding: 3px 10px;
  transition: background .15s;
}
.row-section a:hover { background: var(--surface2); }
.row-pos { flex-shrink: 0; width: 130px; text-align: right; font-size: 11px; color: var(--muted); }
.empty-msg { padding: 40px 20px; text-align: center; color: var(--muted); font-size: 14px; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }

/* ── MOBILE ───────────────────────────────── */
@media (max-width: 480px) {
  header { padding: 8px 12px; gap: 8px; }
  .logo img { height: 24px; }
  .htext h1 { font-size: 13px; line-height: 1.3; }
  .toolbar { padding: 6px 10px; }
  .sw { flex: 0 0 auto; width: 84px; min-width: 84px; overflow: hidden; transition: width .25s ease; cursor: pointer; }
  .sw.expanded { flex: 1 0 100%; width: 100%; min-width: 0; cursor: text; }
  .sw input { opacity: 0; pointer-events: none; }
  .sw.expanded input { opacity: 1; pointer-events: auto; }
  .sw-collapsed-label { display: inline; position: absolute; left: 32px; top: 50%; transform: translateY(-50%); font-size: 12px; color: var(--muted); pointer-events: none; white-space: nowrap; }
  .sw.expanded .sw-collapsed-label { display: none; }
  .list-header { display: none; }
  .row { flex-direction: column; align-items: flex-start; gap: 6px; padding: 10px 12px; }
  .row-section, .row-pos { width: auto; text-align: left; }
}
</style>

// ══════════════════════════════════════════════════════════════
// SECTIONS — where each section's data lives and what to call it
// ══════════════════════════════════════════════════════════════
const SECTIONS = [
  { id: 1, name: 'McCombs Pergola Brick Garden', page: 'section1.html', fallback: {} },
  { id: 2, name: 'Lois Perkins Peace Garden West', page: 'section2.html', fallback: SECTION2_FALLBACK },
  { id: 3, name: 'Lois Perkins Peace Garden East', page: 'section3.html', fallback: SECTION3_FALLBACK },
  { id: 4, name: 'McCombs Pergola Benches', page: 'benches.html', fallback: {} },
];
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwVLoO4GPku1q0QrMr1lPw7bLvBeh8gcDDWx_DLkylWq_GHgBYYQ173SFNmFsmbxT7w/exec';

const BENCH_NAMES = { N: 'North Bench', W: 'West Bench', S: 'South Bench' };

// *text* renders as italics; HTML-escaped first so a name containing
// < & > can't break the markup.
function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function formatLine(s) {
  return escapeHtml(s || '').replace(/\*(.+?)\*/g, '<em>$1</em>');
}
// Drops only trailing blanks (nothing meaningful after the last
// inscribed line); a blank in the middle stays exactly where it is.
function trimTrailingBlanks(lines) {
  const out = lines.map(l => l || '');
  while (out.length && !out[out.length - 1]) out.pop();
  return out;
}

function formatPosition(sectionId, key) {
  const parts = String(key).split(',');
  if (sectionId === 4) {
    const benchName = BENCH_NAMES[parts[0]] || parts[0];
    const idx = parseInt(parts[1], 10);
    return `${benchName}, Plaque ${idx + 1}`;
  }
  return `Grid ${parts[0]}, ${parts[1]}`;
}

// ══════════════════════════════════════════════════════════════
// FETCH — one JSONP call per section, in parallel, with a
// per-call timeout so one slow/unreachable section doesn't
// block the rest of the list from showing.
// ══════════════════════════════════════════════════════════════
function gasGet(sectionId) {
  return new Promise(resolve => {
    if (!GAS_URL) { resolve(null); return; }
    const cb = '_gsList' + sectionId + '_' + Date.now();
    const s = document.createElement('script');
    const t = setTimeout(() => {
      if (window[cb]) { delete window[cb]; s.parentNode && s.parentNode.removeChild(s); resolve(null); }
    }, 8000);
    window[cb] = function(data) {
      clearTimeout(t); delete window[cb]; s.parentNode && s.parentNode.removeChild(s);
      resolve(data || {});
    };
    s.onerror = function() { clearTimeout(t); delete window[cb]; resolve(null); };
    s.src = GAS_URL + '?action=get&section=' + sectionId + '&callback=' + cb;
    document.head.appendChild(s);
  });
}

let allRecords = [];
const failedSections = [];

async function loadAll() {
  const results = await Promise.all(SECTIONS.map(s => gasGet(s.id)));
  const records = [];
  SECTIONS.forEach((s, i) => {
    const data = results[i];
    if (data === null) failedSections.push(s.name);
    const merged = Object.assign({}, s.fallback, data || {});
    Object.keys(merged).forEach(key => {
      const e = merged[key];
      const lines = trimTrailingBlanks(e.lines || []);
      if (!lines.length) return;
      records.push({ section: s.name, page: s.page, sectionId: s.id, key, lines });
    });
  });
  records.sort((a, b) =>
    a.section.localeCompare(b.section) ||
    a.key.localeCompare(b.key, undefined, { numeric: true })
  );
  allRecords = records;

  const statusEl = document.getElementById('status');
  if (failedSections.length === SECTIONS.length) {
    statusEl.textContent = 'Could not reach the live data right now — showing the last known inscriptions, please refresh to try again.';
    statusEl.style.display = 'block';
  } else if (failedSections.length) {
    statusEl.textContent = `Note: couldn't refresh ${failedSections.join(', ')} — showing their last known inscriptions.`;
    statusEl.style.display = 'block';
  } else {
    statusEl.style.display = 'none';
  }

  document.getElementById('hstats').textContent = `${allRecords.length} inscriptions across ${SECTIONS.length} sections`;

  const initialQuery = new URLSearchParams(location.search).get('q');
  if (initialQuery) {
    document.getElementById('search').value = initialQuery;
    runSearch(initialQuery);
  } else {
    render(allRecords);
  }
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function render(records) {
  const list = document.getElementById('list');
  list.innerHTML = '';
  if (!records.length) {
    list.innerHTML = '<div class="empty-msg">No inscriptions found.</div>';
    return;
  }
  records.forEach(r => {
    const row = document.createElement('div');
    row.className = 'row';
    const highlightUrl = `${r.page}?highlight=${encodeURIComponent(r.key)}`;
    row.innerHTML =
      `<div class="row-lines">${r.lines.map(l => `<div>${formatLine(l) || '&nbsp;'}</div>`).join('')}</div>` +
      `<div class="row-section"><a href="${highlightUrl}">${r.section}</a></div>` +
      `<div class="row-pos">${formatPosition(r.sectionId, r.key)}</div>`;
    list.appendChild(row);
  });
}

// ═══════════════════════════════════════════════════════════
// SEARCH — matches words across all inscription lines, same
// cross-line behavior as the section pages' search.
// ═══════════════════════════════════════════════════════════
function runSearch(q) {
  if (!q) { document.getElementById('rinfo').textContent = ''; render(allRecords); return; }
  const words = q.toLowerCase().split(/\s+/).filter(Boolean);
  const results = allRecords.filter(r => {
    const joined = (r.lines.join(' ') + ' ' + r.section).toLowerCase();
    return words.every(w => joined.includes(w));
  });
  document.getElementById('rinfo').textContent = results.length + ' found';
  render(results);
}

let searchTimer;
// Mobile: search starts collapsed to a small "Search" pill so at least
// one section tab is visible alongside it; tapping it expands to the full
// input (pushing tabs into the scrollable area), and it re-collapses on
// blur if left empty.
const swBox = document.getElementById('sw');
swBox.addEventListener('click', () => {
  if (window.innerWidth <= 480 && !swBox.classList.contains('expanded')) {
    swBox.classList.add('expanded');
    document.getElementById('search').focus();
  }
});
document.getElementById('search').addEventListener('blur', () => {
  if (window.innerWidth <= 480 && !document.getElementById('search').value) {
    swBox.classList.remove('expanded');
  }
});

document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  searchTimer = setTimeout(() => runSearch(q), 200);
});

loadAll();
</script>
